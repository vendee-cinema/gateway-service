version: '3.9'

services:
  gateway-service:
    container_name: gateway-service
    image: vendee-cinema/gateway-service:dev
    build:
      context: .
      dockerfile: .dockerfile
    restart: always
    env_file:
      - .env.production.local
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - vendee-cinema

networks:
  vendee-cinema:
    external: true
